<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandSense - Physiotherapy Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #EEF2F7;
            --card: #FFFFFF;
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --text: #111827;
            --muted: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
            --r: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .screen { display: none; width: 100%; max-width: 560px; animation: fadeIn .3s ease; }
        .screen.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card { background: var(--card); border-radius: var(--r); box-shadow: var(--shadow); padding: 32px; }

        /* BUTTONS */
        .btn {
            display: block; width: 100%; padding: 14px;
            border: none; border-radius: 12px;
            font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all .2s; text-align: center;
        }
        .btn-primary  { background: var(--primary); color: #fff; }
        .btn-primary:hover  { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-secondary:hover { background: #D1D5DB; }
        .btn + .btn { margin-top: 10px; }

        /* MENU LOGO */
        .menu-logo { text-align: center; margin-bottom: 28px; }
        .logo-mark {
            display: inline-flex; align-items: center; justify-content: center;
            width: 72px; height: 72px; border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), #6366F1);
            margin-bottom: 10px;
        }
        .logo-mark svg { width: 40px; height: 40px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .menu-logo h1 { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: -.5px; }
        .menu-logo p  { color: var(--muted); font-size: 14px; margin-top: 3px; }

        .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--muted);
                      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 7px; }
        .form-input {
            width: 100%; padding: 12px 16px; border: 2px solid var(--border);
            border-radius: 10px; font-size: 16px; font-family: 'Inter', sans-serif;
            outline: none; transition: border-color .2s; margin-bottom: 20px;
        }
        .form-input:focus { border-color: var(--primary); }

        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .mode-btn {
            padding: 16px; border: 2.5px solid var(--border); border-radius: 12px;
            background: #fff; cursor: pointer; text-align: center; transition: all .2s;
            font-family: 'Inter', sans-serif;
        }
        .mode-btn:hover  { border-color: var(--primary); background: #EFF6FF; }
        .mode-btn.active { border-color: var(--primary); background: #EFF6FF; }
        .mode-icon-wrap {
            width: 44px; height: 44px; border-radius: 12px; margin: 0 auto 8px;
            display: flex; align-items: center; justify-content: center;
            background: #EFF6FF;
        }
        .mode-icon-wrap svg { width: 24px; height: 24px; }
        .mode-btn.active .mode-icon-wrap { background: var(--primary); }
        .mode-btn.active .mode-icon-wrap svg { stroke: #fff; }
        .mode-btn:not(.active) .mode-icon-wrap svg { stroke: var(--primary); }
        .m-name { font-weight: 700; font-size: 15px; }
        .m-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

        .best-row { margin-top: 16px; padding: 12px 16px; background: #F9FAFB;
                    border-radius: 10px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .best-row .label { color: var(--muted); }
        .best-row .val { font-weight: 800; color: var(--primary); font-size: 16px; }

        /* GAME HEADER */
        .game-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .round-label { font-size: 13px; font-weight: 600; color: var(--muted); }
        .score-val   { font-size: 22px; font-weight: 800; color: var(--primary); }
        .streak-pill {
            display: flex; align-items: center; gap: 4px;
            background: #FEF3C7; color: #D97706;
            padding: 4px 10px; border-radius: 20px;
            font-size: 13px; font-weight: 700; transition: all .3s;
        }
        .streak-pill.hot { background: #FEE2E2; color: #DC2626; }
        .streak-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #D97706; transition: background .3s;
        }
        .streak-pill.hot .streak-dot { background: #DC2626; }

        /* PROGRESS DOTS */
        .progress-row { display: flex; gap: 5px; margin-bottom: 12px; }
        .pdot { flex: 1; height: 5px; border-radius: 3px; background: var(--border); transition: background .3s; }
        .pdot.done    { background: var(--success); }
        .pdot.current { background: var(--primary); }

        /* TIMER */
        .timer-wrap { height: 6px; background: var(--border); border-radius: 3px;
                      margin-bottom: 12px; overflow: hidden; display: none; }
        .timer-wrap.on { display: block; }
        .timer-bar { height: 100%; border-radius: 3px; background: var(--primary); transition: width .1s linear, background .4s; }
        .timer-bar.warn { background: var(--warning); }
        .timer-bar.crit { background: var(--danger); }

        /* MULTIPLIER */
        .mult-row { text-align: center; min-height: 20px; font-size: 13px; font-weight: 600;
                    color: var(--muted); margin-bottom: 14px; }
        .mult-row .x2 { color: var(--warning); font-size: 14px; font-weight: 800; }
        .mult-row .x3 { color: var(--danger);  font-size: 14px; font-weight: 800; }

        /* IMAGE */
        .img-wrap {
            position: relative; border-radius: 14px; overflow: hidden;
            margin-bottom: 20px; background: #F3F4F6;
            aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center;
        }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .img-placeholder {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 10px; padding: 20px;
            text-align: center;
        }
        .ph-label { font-size: 12px; font-weight: 600; opacity: .45; }
        .diff-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,.45); color: #fff;
            padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
        }

        /* ANSWER BUTTONS */
        .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .ans-btn {
            padding: 18px 12px; border: 3px solid var(--border); border-radius: 14px;
            background: #fff; cursor: pointer; font-family: 'Inter', sans-serif;
            font-size: 17px; font-weight: 700; color: var(--text);
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            transition: all .15s;
        }
        .hand-arrow {
            width: 40px; height: 40px; border-radius: 50%;
            background: #EFF6FF; display: flex; align-items: center; justify-content: center;
        }
        .hand-arrow svg { width: 22px; height: 22px; stroke: var(--primary); stroke-width: 2.5; stroke-linecap: round; fill: none; }
        .ans-btn:hover:not(:disabled) { border-color: var(--primary); background: #EFF6FF; transform: translateY(-2px); }
        .ans-btn:hover:not(:disabled) .hand-arrow { background: var(--primary); }
        .ans-btn:hover:not(:disabled) .hand-arrow svg { stroke: #fff; }
        .ans-btn:disabled { cursor: not-allowed; opacity: .75; }
        .ans-btn.correct { border-color: var(--success); background: #D1FAE5; }
        .ans-btn.correct .hand-arrow { background: var(--success); }
        .ans-btn.correct .hand-arrow svg { stroke: #fff; }
        .ans-btn.wrong   { border-color: var(--danger);  background: #FEE2E2; }
        .ans-btn.wrong .hand-arrow { background: var(--danger); }
        .ans-btn.wrong .hand-arrow svg { stroke: #fff; }

        /* FEEDBACK TOAST */
        .toast-wrap { position: fixed; inset: 0; display: flex; align-items: center;
                      justify-content: center; pointer-events: none; z-index: 200; }
        .toast {
            background: #fff; padding: 22px 36px; border-radius: 18px;
            box-shadow: 0 8px 40px rgba(0,0,0,.14); text-align: center;
            transform: scale(0);
            transition: transform .25s cubic-bezier(.34,1.56,.64,1);
            min-width: 180px;
        }
        .toast.show { transform: scale(1); }
        .toast-icon {
            width: 48px; height: 48px; border-radius: 50%; margin: 0 auto 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .toast-icon svg { width: 28px; height: 28px; stroke: #fff; stroke-width: 3; stroke-linecap: round; fill: none; }
        .toast-icon.ok   { background: var(--success); }
        .toast-icon.fail { background: var(--danger); }
        .toast-icon.time { background: var(--warning); }
        .t-text { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
        .toast.ok   .t-text { color: var(--success); }
        .toast.fail .t-text { color: var(--danger); }
        .t-pts  { font-size: 24px; font-weight: 800; color: var(--primary); }

        /* RESULTS */
        .res-header { text-align: center; margin-bottom: 24px; }
        .res-icon-wrap {
            width: 64px; height: 64px; border-radius: 20px; margin: 0 auto 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .res-icon-wrap svg { width: 36px; height: 36px; stroke: #fff; stroke-width: 2; fill: none; stroke-linecap: round; }
        .res-title { font-size: 24px; font-weight: 800; }
        .res-sub   { color: var(--muted); font-size: 14px; margin-top: 3px; }
        .score-big { text-align: center; font-size: 64px; font-weight: 800;
                     color: var(--primary); letter-spacing: -2px; margin: 18px 0; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .stat { background: #F9FAFB; border-radius: 12px; padding: 16px; text-align: center; }
        .stat .sv { font-size: 26px; font-weight: 800; }
        .stat .sl { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 600; }

        /* LEADERBOARD */
        .lb-title { text-align: center; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
        .lb-sub   { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 20px; }
        .lb-list  { list-style: none; }
        .lb-item  { display: flex; align-items: center; padding: 11px 0;
                    border-bottom: 1px solid var(--border); }
        .lb-item:last-child { border-bottom: none; }
        .lb-rank  { width: 30px; height: 30px; border-radius: 50%; background: var(--border);
                    display: flex; align-items: center; justify-content: center;
                    font-weight: 800; font-size: 13px; flex-shrink: 0; margin-right: 12px; }
        .lb-rank.g { background: #FEF3C7; color: #D97706; }
        .lb-rank.s { background: #F3F4F6; color: #6B7280; }
        .lb-rank.b { background: #FEF3C7; color: #92400E; }
        .lb-name  { flex: 1; font-weight: 600; }
        .lb-score { font-weight: 800; color: var(--primary); font-size: 17px; }
        .lb-meta  { font-size: 11px; color: var(--muted); text-align: right; margin-left: 8px; }

        /* MODE BADGE */
        .mode-badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 11px; font-weight: 700;
        }
        .mode-badge.normal { background: #D1FAE5; color: #065F46; }
        .mode-badge.timed  { background: #FEE2E2; color: #DC2626; }
    </style>
</head>
<body>

<!-- MENU -->
<div id="s-menu" class="screen active">
    <div class="card">
        <div class="menu-logo">
            <div class="logo-mark">
                <svg viewBox="0 0 40 40">
                    <path d="M20 8 C20 8 12 10 12 20 L12 28 C12 32 16 34 20 34 C24 34 28 32 28 28 L28 20 C28 10 20 8 20 8Z"/>
                    <line x1="20" y1="20" x2="20" y2="28"/>
                    <line x1="16" y1="22" x2="24" y2="22"/>
                </svg>
            </div>
            <h1>HandSense</h1>
            <p>Physiotherapy Training Game</p>
        </div>

        <label class="form-label">Your Name</label>
        <input id="inp-name" class="form-input" type="text" placeholder="Enter your name..." maxlength="20">

        <label class="form-label">Game Mode</label>
        <div class="mode-grid">
            <button class="mode-btn active" id="m-normal" onclick="setMode('normal')">
                <div class="mode-icon-wrap">
                    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" fill="none">
                        <circle cx="12" cy="12" r="9"/>
                        <path d="M12 7 L12 12 L15 15"/>
                    </svg>
                </div>
                <div class="m-name">Normal</div>
                <div class="m-desc">Take your time</div>
            </button>
            <button class="mode-btn" id="m-timed" onclick="setMode('timed')">
                <div class="mode-icon-wrap">
                    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" fill="none">
                        <polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/>
                    </svg>
                </div>
                <div class="m-name">Time Attack</div>
                <div class="m-desc">8 seconds per round</div>
            </button>
        </div>

        <button class="btn btn-primary" onclick="startGame()">Start Game &rarr;</button>
        <button class="btn btn-secondary" onclick="goLeaderboard()">&#9733; Leaderboard</button>

        <div class="best-row">
            <span class="label">Your best score:</span>
            <span class="val" id="best-val">--</span>
        </div>
    </div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
    <div class="card">
        <div class="game-header">
            <span class="round-label">Round <span id="g-round">1</span>/10</span>
            <span class="score-val" id="g-score">0</span>
            <span class="streak-pill" id="g-streak">
                <span class="streak-dot"></span>
                Streak <span id="g-streak-n">0</span>
            </span>
        </div>

        <div class="progress-row" id="g-dots"></div>
        <div class="timer-wrap" id="g-timer"><div class="timer-bar" id="g-tbar"></div></div>
        <div class="mult-row" id="g-mult"></div>

        <div class="img-wrap">
            <img id="g-img" alt="Hand image">
            <div class="img-placeholder" id="g-ph"></div>
            <div class="diff-badge" id="g-diff">Level 1</div>
        </div>

        <div class="answer-grid">
            <button class="ans-btn" id="btn-L" onclick="answer('left')">
                <div class="hand-arrow">
                    <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
                </div>
                Left Hand
            </button>
            <button class="ans-btn" id="btn-R" onclick="answer('right')">
                <div class="hand-arrow">
                    <svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>
                </div>
                Right Hand
            </button>
        </div>
    </div>
</div>

<!-- RESULTS -->
<div id="s-results" class="screen">
    <div class="card">
        <div class="res-header">
            <div class="res-icon-wrap" id="r-icon-wrap" style="background:var(--primary)">
                <svg viewBox="0 0 24 24" id="r-icon-svg">
                    <polyline points="20,6 9,17 4,12"/>
                </svg>
            </div>
            <div class="res-title" id="r-title">Well done!</div>
            <div class="res-sub" id="r-sub">Here is how you did</div>
        </div>
        <div class="score-big" id="r-score">0</div>
        <div class="stats-grid">
            <div class="stat"><div class="sv" id="r-acc">0%</div><div class="sl">Accuracy</div></div>
            <div class="stat"><div class="sv" id="r-streak">0</div><div class="sl">Best Streak</div></div>
            <div class="stat"><div class="sv" id="r-correct">0/10</div><div class="sl">Correct</div></div>
            <div class="stat"><div class="sv" id="r-mode">--</div><div class="sl">Mode</div></div>
        </div>
        <button class="btn btn-primary"   onclick="startGame()">&#9654; Play Again</button>
        <button class="btn btn-secondary" onclick="goLeaderboard()">&#9733; Leaderboard</button>
        <button class="btn btn-secondary" onclick="showScreen('s-menu')">&larr; Menu</button>
    </div>
</div>

<!-- LEADERBOARD -->
<div id="s-lb" class="screen">
    <div class="card">
        <div class="lb-title">&#9733; Leaderboard</div>
        <div class="lb-sub">Local high scores</div>
        <ul class="lb-list" id="lb-list"></ul>
        <button class="btn btn-secondary" style="margin-top:20px" onclick="showScreen('s-menu')">&larr; Back</button>
    </div>
</div>

<!-- FEEDBACK TOAST -->
<div class="toast-wrap">
    <div class="toast" id="toast">
        <div class="toast-icon ok" id="t-icon-wrap">
            <svg viewBox="0 0 24 24" id="t-icon-svg"><polyline points="20,6 9,17 4,12"/></svg>
        </div>
        <div class="t-text" id="t-text">Correct!</div>
        <div class="t-pts"  id="t-pts">+100</div>
    </div>
</div>

<script>
const DB = [
    { id:  1, url: 'images/left-2.jpg',   answer: 'left',  difficulty: 1, tags: ['palm',    'white_bg'] },
    { id:  2, url: 'images/left-3.jpg',   answer: 'left',  difficulty: 1, tags: ['back',    'white_bg'] },
    { id:  3, url: 'images/right-4.jpg',  answer: 'right', difficulty: 1, tags: ['palm',    'white_bg'] },
    { id:  4, url: 'images/right-5.jpg',  answer: 'right', difficulty: 1, tags: ['palm',    'white_bg'] },
    { id:  5, url: 'images/left-5.jpg',   answer: 'left',  difficulty: 2, tags: ['back',    'angle'] },
    { id:  6, url: 'images/right-7.jpg',  answer: 'right', difficulty: 2, tags: ['back',    'angle'] },
    { id:  7, url: 'images/left-4.jpg',   answer: 'left',  difficulty: 3, tags: ['back',    'elderly'] },
    { id:  8, url: 'images/left-6.jpg',   answer: 'left',  difficulty: 3, tags: ['palm',    'elderly'] },
    { id:  9, url: 'images/left-8.jpg',   answer: 'left',  difficulty: 3, tags: ['palm',    'curled'] },
    { id: 10, url: 'images/right-3.jpg',  answer: 'right', difficulty: 3, tags: ['everyday','keyboard'] },
    { id: 11, url: 'images/right-9.jpg',  answer: 'right', difficulty: 3, tags: ['palm',    'curled'] },
    { id: 12, url: 'images/right-10.jpg', answer: 'right', difficulty: 3, tags: ['everyday','coffee'] },
    { id: 13, url: 'images/left-1.jpg',   answer: 'left',  difficulty: 4, tags: ['shoulder','physio'] },
    { id: 14, url: 'images/right-2.jpg',  answer: 'right', difficulty: 4, tags: ['unusual', 'outdoor'] },
    { id: 15, url: 'images/right-6.jpg',  answer: 'right', difficulty: 4, tags: ['shoulder','physio'] },
    { id: 16, url: 'images/right-8.jpg',  answer: 'right', difficulty: 4, tags: ['curled',  'outdoor'] },
    { id: 17, url: 'images/left-7.jpg',   answer: 'left',  difficulty: 5, tags: ['full_arm','outdoor'] },
    { id: 18, url: 'images/right-1.jpg',  answer: 'right', difficulty: 5, tags: ['full_arm','outdoor'] },
];

const DIFF_STYLE = {
    1: { bg: '#DBEAFE', color: '#1E40AF', label: 'Level 1 - Easy' },
    2: { bg: '#D1FAE5', color: '#065F46', label: 'Level 2'        },
    3: { bg: '#FEF9C3', color: '#854D0E', label: 'Level 3'        },
    4: { bg: '#FFEDD5', color: '#9A3412', label: 'Level 4'        },
    5: { bg: '#FCE7F3', color: '#9D174D', label: 'Level 5 - Hard' },
};

const G = {
    name: 'Player', mode: 'normal',
    round: 0, totalRounds: 10,
    score: 0, streak: 0, maxStreak: 0, correct: 0,
    queue: [], answered: false,
    timerID: null, timeLeft: 8000, timeTaken: 0,
};

const $ = id => document.getElementById(id);
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function multiplier() {
    return G.streak >= 5 ? 3 : G.streak >= 3 ? 2 : 1;
}

function setMode(m) {
    G.mode = m;
    $('m-normal').classList.toggle('active', m === 'normal');
    $('m-timed' ).classList.toggle('active', m === 'timed');
}

function buildQueue() {
    const q = [];
    for (let d = 1; d <= 5; d++) {
        const pool = shuffle(DB.filter(x => x.difficulty === d));
        q.push(pool[0], pool[1]);
    }
    return shuffle(q);
}

function startGame() {
    G.name      = $('inp-name').value.trim() || 'Player';
    G.round     = 0; G.score  = 0; G.streak = 0;
    G.maxStreak = 0; G.correct = 0;
    G.queue     = buildQueue();
    showScreen('s-game');
    buildDots();
    nextRound();
}

function buildDots() {
    $('g-dots').innerHTML = Array.from({ length: G.totalRounds })
        .map((_, i) => '<div class="pdot" id="pd-' + i + '"></div>').join('');
}

function nextRound() {
    if (G.round >= G.totalRounds) { endGame(); return; }

    G.answered = false;
    const img = G.queue[G.round];
    const ds  = DIFF_STYLE[img.difficulty];

    $('g-round').textContent    = G.round + 1;
    $('g-score').textContent    = G.score.toLocaleString();
    $('g-streak-n').textContent = G.streak;
    $('g-streak').className     = 'streak-pill' + (G.streak >= 5 ? ' hot' : '');

    for (let i = 0; i < G.totalRounds; i++) {
        $('pd-' + i).className = 'pdot' + (i < G.round ? ' done' : i === G.round ? ' current' : '');
    }

    updateMult();
    $('g-diff').textContent = ds.label;

    if (img.url) {
        $('g-img').src = img.url;
        $('g-img').style.display = 'block';
        $('g-ph').style.display  = 'none';
    } else {
        $('g-img').style.display = 'none';
        $('g-ph').style.display  = 'flex';
        $('g-ph').style.background = ds.bg;
        $('g-ph').innerHTML = '<div class="ph-label" style="color:' + ds.color + '">' + ds.label + '<br>Add image to images/ folder</div>';
    }

    ['btn-L','btn-R'].forEach(id => { $(id).disabled = false; $(id).className = 'ans-btn'; });

    if (G.mode === 'timed') startTimer();
}

function updateMult() {
    const el = $('g-mult');
    if (G.streak >= 5)
        el.innerHTML = 'Streak x' + G.streak + ' &mdash; <span class="x3">3x MULTIPLIER!</span>';
    else if (G.streak >= 3)
        el.innerHTML = 'Streak x' + G.streak + ' &mdash; <span class="x2">2x MULTIPLIER</span>';
    else if (G.streak > 0)
        el.textContent = 'Streak: ' + G.streak + ' - reach 3 for 2x!';
    else
        el.textContent = '';
}

function startTimer() {
    const wrap = $('g-timer'), bar = $('g-tbar');
    wrap.classList.add('on');
    G.timeLeft = 8000;
    const t0 = Date.now();
    clearInterval(G.timerID);
    G.timerID = setInterval(function() {
        G.timeLeft = Math.max(0, 8000 - (Date.now() - t0));
        const pct = G.timeLeft / 80;
        bar.style.width = pct + '%';
        bar.className = 'timer-bar' + (pct < 30 ? ' crit' : pct < 60 ? ' warn' : '');
        if (G.timeLeft <= 0) { clearInterval(G.timerID); if (!G.answered) answer(null); }
    }, 50);
}

function stopTimer() {
    clearInterval(G.timerID);
    $('g-timer').classList.remove('on');
}

function answer(choice) {
    if (G.answered) return;
    G.answered = true;
    if (G.mode === 'timed') { G.timeTaken = 8000 - G.timeLeft; stopTimer(); }

    const img = G.queue[G.round];
    const isCorrect = choice === img.answer;

    $('btn-L').disabled = true;
    $('btn-R').disabled = true;

    if (choice === 'left') {
        $('btn-L').classList.add(isCorrect ? 'correct' : 'wrong');
        if (!isCorrect) $('btn-R').classList.add('correct');
    } else if (choice === 'right') {
        $('btn-R').classList.add(isCorrect ? 'correct' : 'wrong');
        if (!isCorrect) $('btn-L').classList.add('correct');
    } else {
        $(img.answer === 'left' ? 'btn-L' : 'btn-R').classList.add('correct');
    }

    let pts = 0;
    if (isCorrect) {
        G.correct++;
        G.streak++;
        if (G.streak > G.maxStreak) G.maxStreak = G.streak;
        const m = multiplier();
        let tb = 0;
        if (G.mode === 'timed') {
            if (G.timeTaken < 2000) tb = 50;
            else if (G.timeTaken < 4000) tb = 30;
            else if (G.timeTaken < 6000) tb = 15;
        }
        pts = Math.round((100 + tb) * m);
        G.score += pts;
    } else {
        G.streak = 0;
    }

    showToast(isCorrect, pts, choice === null);

    setTimeout(function() {
        G.round++;
        nextRound();
        $('g-score').textContent    = G.score.toLocaleString();
        $('g-streak-n').textContent = G.streak;
        $('g-streak').className     = 'streak-pill' + (G.streak >= 5 ? ' hot' : '');
        updateMult();
    }, 1400);
}

function showToast(ok, pts, timeout) {
    const t    = $('toast');
    const wrap = $('t-icon-wrap');
    const svg  = $('t-icon-svg');
    const checkPath  = '<polyline points="20,6 9,17 4,12"/>';
    const crossPath  = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
    const clockPath  = '<circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 15,15"/>';

    if (timeout) {
        t.className = 'toast fail';
        wrap.className = 'toast-icon time';
        svg.innerHTML = clockPath;
        $('t-text').textContent = "Time's up!";
        $('t-pts' ).textContent = '+0';
    } else if (ok) {
        const m = multiplier();
        t.className = 'toast ok';
        wrap.className = 'toast-icon ok';
        svg.innerHTML = checkPath;
        $('t-text').textContent = m >= 3 ? 'AMAZING! 3x' : m >= 2 ? 'Great! 2x' : 'Correct!';
        $('t-pts' ).textContent = '+' + pts;
    } else {
        t.className = 'toast fail';
        wrap.className = 'toast-icon fail';
        svg.innerHTML = crossPath;
        $('t-text').textContent = 'Wrong!';
        $('t-pts' ).textContent = '+0';
    }
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 1200);
}

function endGame() {
    const acc = Math.round(G.correct / G.totalRounds * 100);
    var bgColor, svgPath, title;
    if (acc === 100) {
        bgColor = '#F59E0B'; title = 'Perfect Score!';
        svgPath = '<polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9"/>';
    } else if (acc >= 80) {
        bgColor = '#10B981'; title = 'Excellent!';
        svgPath = '<polyline points="20,6 9,17 4,12"/>';
    } else if (acc >= 60) {
        bgColor = '#3B82F6'; title = 'Good Effort!';
        svgPath = '<polyline points="20,6 9,17 4,12"/>';
    } else {
        bgColor = '#6B7280'; title = 'Keep Practicing!';
        svgPath = '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>';
    }

    $('r-icon-wrap').style.background = bgColor;
    $('r-icon-svg').innerHTML = svgPath;
    $('r-title'  ).textContent = title;
    $('r-score'  ).textContent = G.score.toLocaleString();
    $('r-acc'    ).textContent = acc + '%';
    $('r-streak' ).textContent = G.maxStreak;
    $('r-correct').textContent = G.correct + '/10';
    $('r-mode'   ).textContent = G.mode === 'timed' ? 'Timed' : 'Normal';

    saveScore();
    showScreen('s-results');
}

function loadScores() {
    try { return JSON.parse(localStorage.getItem('hs_scores') || '[]'); }
    catch { return []; }
}

function saveScore() {
    const scores = loadScores();
    scores.push({ name: G.name, score: G.score, mode: G.mode,
                  acc: Math.round(G.correct / G.totalRounds * 100),
                  date: new Date().toLocaleDateString() });
    scores.sort(function(a,b) { return b.score - a.score; });
    localStorage.setItem('hs_scores', JSON.stringify(scores.slice(0, 25)));
    refreshBest();
}

function refreshBest() {
    const top = loadScores()[0];
    $('best-val').textContent = top ? top.score.toLocaleString() : '--';
}

function goLeaderboard() { renderLB(); showScreen('s-lb'); }

function renderLB() {
    const scores = loadScores().slice(0, 10);
    const list   = $('lb-list');
    if (!scores.length) {
        list.innerHTML = '<li style="padding:20px;text-align:center;color:var(--muted)">No scores yet - be the first!</li>';
        return;
    }
    list.innerHTML = scores.map(function(s, i) {
        var rc = i === 0 ? 'g' : i === 1 ? 's' : i === 2 ? 'b' : '';
        var rl = '#' + (i + 1);
        var modeCls = s.mode === 'timed' ? 'timed' : 'normal';
        var modeLabel = s.mode === 'timed' ? 'Timed' : 'Normal';
        return '<li class="lb-item">' +
            '<div class="lb-rank ' + rc + '">' + rl + '</div>' +
            '<div class="lb-name">' + esc(s.name) + '</div>' +
            '<div>' +
                '<div class="lb-score">' + s.score.toLocaleString() + '</div>' +
                '<div class="lb-meta">' + s.acc + '% &middot; ' + s.date + ' &middot; <span class="mode-badge ' + modeCls + '">' + modeLabel + '</span></div>' +
            '</div>' +
        '</li>';
    }).join('');
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    $(id).classList.add('active');
    if (id === 's-menu') refreshBest();
}

document.addEventListener('keydown', function(e) {
    if (!$('s-game').classList.contains('active') || G.answered) return;
    if (e.key === 'ArrowLeft'  || e.key.toLowerCase() === 'l') answer('left');
    if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'r') answer('right');
});

refreshBest();
</script>
</body>
</html>
